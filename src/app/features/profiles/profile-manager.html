<section class="page-header"><div><p>Configuración cervecera</p><h1>Perfiles</h1><span>Guarda configuraciones reutilizables para tu equipo y tus procesos.</span></div><button type="button" (click)="create()">Nuevo perfil</button></section>
<nav class="tabs" aria-label="Tipos de perfil"><button type="button" [class.active]="type==='equipment'" (click)="changeType('equipment')">Equipos</button><button type="button" [class.active]="type==='mash'" (click)="changeType('mash')">Macerado</button><button type="button" [class.active]="type==='carbonation'" (click)="changeType('carbonation')">Carbonatación</button><button type="button" [class.active]="type==='fermentation'" (click)="changeType('fermentation')">Fermentación</button></nav>
<section class="profile-layout"><aside>@for(item of items();track item.id){<button type="button" [class.active]="form().controls.id.value===item.id" (click)="select(type,item)"><strong>{{item.name}}</strong><span>{{item.notes||item.id}}</span></button>}</aside><article>
  <form [formGroup]="form()" (ngSubmit)="save()"><div class="form-heading"><div><span>Perfil editable</span><h2>{{form().controls.name.value}}</h2></div><div><button type="button" class="ghost" (click)="duplicate()">Duplicar</button><button type="button" class="danger" (click)="remove()">Eliminar</button><button type="submit">Guardar</button></div></div>
    <div class="grid"><label>ID<input formControlName="id" /></label><label>Nombre<input formControlName="name" /></label>
    @switch(type){@case('equipment'){<label>Volumen lote L<input type="number" formControlName="batchVolumeL" /></label><label>Volumen hervido L<input type="number" formControlName="boilVolumeL" /></label><label>Eficiencia %<input type="number" formControlName="efficiencyPercent" /></label><label>Macerador L<input type="number" formControlName="mashTunVolumeL" /></label><label>Hervidor L<input type="number" formControlName="kettleVolumeL" /></label><label>Fermentador L<input type="number" formControlName="fermenterVolumeL" /></label><label>Evaporación L/h<input type="number" formControlName="boilOffLPerHour" /></label><label>Espacio muerto L<input type="number" formControlName="mashTunDeadspaceL" /></label><label>Pérdida trub/enfriador L<input type="number" formControlName="trubChillerLossL" /></label><label>Pérdida fermentación L<input type="number" formControlName="fermentationLossL" /></label><label>Utilización lúpulo %<input type="number" formControlName="hopUtilizationPercent" /></label>}
    @case('mash'){<label>Temperatura °C<input type="number" formControlName="mashTempC" /></label><label>Tiempo min<input type="number" formControlName="mashTimeMin" /></label><label>Mash out °C<input type="number" formControlName="mashOutTempC" /></label><label>Mash out min<input type="number" formControlName="mashOutTimeMin" /></label>}
    @case('carbonation'){<label>Método<input formControlName="method" /></label><label>CO₂ vol<input type="number" step=".1" formControlName="targetVolumes" /></label><label>Temperatura °C<input type="number" formControlName="temperatureC" /></label><label>Presión bar<input type="number" step=".1" formControlName="pressureBar" /></label>}
    @case('fermentation'){<label>Primaria días<input type="number" formControlName="primaryDays" /></label><label>Primaria °C<input type="number" formControlName="primaryTempC" /></label><label>Secundaria días<input type="number" formControlName="secondaryDays" /></label><label>Secundaria °C<input type="number" formControlName="secondaryTempC" /></label><label>Maduración días<input type="number" formControlName="maturationDays" /></label><label>Maduración °C<input type="number" formControlName="maturationTempC" /></label>}}
    <label class="wide">Notas<textarea rows="4" formControlName="notes"></textarea></label></div>
  </form></article></section>
