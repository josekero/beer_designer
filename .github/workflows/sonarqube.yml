name: Tests and SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Download source code
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Configure Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Compile and test backend with coverage
        run: mvn -B -f backend/pom.xml verify

      - name: Verify SonarQube inputs
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          test -s coverage/beer-project/lcov.info || { echo "::error::No se ha generado coverage/beer-project/lcov.info"; exit 1; }
          test -s backend/target/site/jacoco/jacoco.xml || { echo "::error::No se ha generado backend/target/site/jacoco/jacoco.xml"; exit 1; }
          test -n "$SONAR_TOKEN" || { echo "::error::Falta el secreto SONAR_TOKEN en GitHub"; exit 1; }

      - name: Analyze in SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
