services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: beer-designer-frontend:local
    container_name: beer-designer-frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
      grafana:
        condition: service_started

  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: beer-designer-postgres
    environment:
      POSTGRES_DB: beerdb
      POSTGRES_USER: beeruser
      POSTGRES_PASSWORD: beerpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeruser -d beerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: beer-designer-backend:local
    container_name: beer-designer-backend
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/beerdb
      SPRING_DATASOURCE_USERNAME: beeruser
      SPRING_DATASOURCE_PASSWORD: beerpass
      SPRING_DATASOURCE_INITIALIZATION_FAIL_TIMEOUT: 120000
      RECIPE_IMAGE_STORAGE_PATH: /data/recipe-images
    ports:
      - "8082:8080"
    volumes:
      - recipe_images:/data/recipe-images
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  prometheus:
    image: docker.io/prom/prometheus:v3.13.0
    container_name: beer-designer-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: docker.io/grafana/grafana:13.1.0
    container_name: beer-designer-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:8081/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-beer-grafana-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
    name: beer_postgres_data
  recipe_images:
    name: beer_recipe_images
  prometheus_data:
    name: beer_prometheus_data
  grafana_data:
    name: beer_grafana_data
