debug: false

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: beer-designer-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/beerdb}
    username: ${SPRING_DATASOURCE_USERNAME:beeruser}
    password: ${SPRING_DATASOURCE_PASSWORD:beerpass}
    hikari:
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
      initialization-fail-timeout: ${SPRING_DATASOURCE_INITIALIZATION_FAIL_TIMEOUT:120000}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO

beer-designer:
  image-storage-path: ${RECIPE_IMAGE_STORAGE_PATH:/data/recipe-images}
  auth:
    session-hours: ${AUTH_SESSION_HOURS:168}
    secure-cookie: ${AUTH_SECURE_COOKIE:false}
    admin-email: ${ADMIN_EMAIL:admin@beerdesigner.local}
    admin-password: ${ADMIN_PASSWORD:BeerDesigner-Admin-2026!}
    admin-name: ${ADMIN_NAME:Beer Designer Admin}
