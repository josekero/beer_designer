services:
  frontend:
    image: ghcr.io/josekero/beer_designer:latest
    container_name: beer-designer-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

  backend:
    image: ghcr.io/josekero/beer_designer-backend:latest
    container_name: beer-designer-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/beerdb
      SPRING_DATASOURCE_USERNAME: beeruser
      SPRING_DATASOURCE_PASSWORD: beerpass
    depends_on:
      - postgres

  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: beer-designer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beerdb
      POSTGRES_USER: beeruser
      POSTGRES_PASSWORD: beerpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeruser -d beerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
