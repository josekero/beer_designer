services:
  frontend:
    image: ghcr.io/josekero/beer_designer:latest
    container_name: beer-designer-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

  backend:
    image: ghcr.io/josekero/beer_designer-backend:latest
    container_name: beer-designer-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/beerdb
      SPRING_DATASOURCE_USERNAME: beeruser
      SPRING_DATASOURCE_PASSWORD: beerpass
      SPRING_DATASOURCE_INITIALIZATION_FAIL_TIMEOUT: 120000
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: ghcr.io/josekero/beer_designer-postgres:latest
    container_name: beer-designer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beerdb
      POSTGRES_USER: beeruser
      POSTGRES_PASSWORD: beerpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeruser -d beerdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
